<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad-top" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#B197FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9775FA;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-mid" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#748FFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C7CFA;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-bottom" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#4DABF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#339AF0;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="200" height="200" rx="44" fill="#0A0A0F" />
  
  <!-- Stacked Stones (Cairn) -->
  <!-- Bottom Stone -->
  <ellipse cx="100" cy="140" rx="55" ry="32" fill="url(#grad-bottom)" />
  
  <!-- Middle Stone -->
  <ellipse cx="100" cy="95" rx="45" ry="26" fill="url(#grad-mid)" />
  
  <!-- Top Stone -->
  <circle cx="100" cy="55" r="22" fill="url(#grad-top)" />
</svg>
